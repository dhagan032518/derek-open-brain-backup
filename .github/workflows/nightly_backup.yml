name: Nightly Supabase Backup

on:
  schedule:
    # Runs at 3:00 AM UTC every night (10 PM CT / 9 PM MT)
    - cron: "0 3 * * *"
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab anytime

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run backup
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python backup.py

      - name: Commit and push backup files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "backup: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
